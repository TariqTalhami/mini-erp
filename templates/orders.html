{% extends "base.html" %}

{% block content %}

<h2 class="page-header">Orders</h2>

<div style="display: flex; gap: 20px;">

    <!-- LEFT: Orders List -->
    <div style="width: 40%;">
        
        <!-- Create Order Form -->
        <div class="card">
            <h3>Create Order</h3>

            <form onsubmit="createOrder(event)">

                <!-- Customer -->
                <div class="form-group">
                    <label>Customer</label>
                    <select id="customer-select" required></select>
                </div>

                <!-- Order Date -->
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="order-date" required>
                </div>

                <!-- Items -->
                <h4>Items</h4>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="items-table-body"></tbody>
                </table>

                <button type="button" onclick="addItemRow()">Add Item</button>

                <br><br>

                <button type="submit" class="btn btn-primary">Create Order</button>

            </form>
        </div>

        <div class="card">
            <h3>Orders</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- RIGHT: Order Details + Form -->
    <div style="width: 60%;">

        <!-- Order Details -->
        <div class="card">
            <h3>Order Details</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody id="order-items-body"></tbody>
            </table>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='js/orders.js') }}"></script>

{% endblock %}
