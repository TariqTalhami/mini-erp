{% extends "base.html" %}

{% block content %}

<h2 class="page-header">Inventory</h2>

<!-- ================= PRODUCT SELECTION ================= -->
<div class="card">
    <div class="form-group">
        <label>Select Product</label>
        <select id="product-select"></select>
    </div>

    <button onclick="loadInventory()" class="btn btn-primary">Load Inventory</button>
</div>

<!-- ================= CURRENT STOCK ================= -->
<div class="card">
    <h3>Current Stock</h3>
    <p id="stock-value">0</p>
</div>

<!-- ================= ADD / REMOVE STOCK ================= -->
<div class="card">

    <h3>Update Stock</h3>

    <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="quantity">
    </div>

    <div class="form-group">
        <label>Reference (optional)</label>
        <input type="text" id="reference">
    </div>

    <button onclick="addStock()" class="btn btn-success">Add Stock</button>
    <button onclick="removeStock()" class="btn btn-danger">Remove Stock</button>

</div>

<!-- ================= MOVEMENT HISTORY ================= -->
<h3 class="page-header">Movement History</h3>

<div class="card">
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Quantity</th>
                <th>Type</th>
                <th>Reference</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="history-table-body"></tbody>
    </table>
</div>

<!-- ================= JS ================= -->
<script src="{{ url_for('static', filename='js/inventory.js') }}"></script>

{% endblock %}
